name: Python Coverage

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write
  contents: write  # Required for the comment action to store coverage data

jobs:
  python-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded to v5 for better stability
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.4.1 coverage==7.9 pytest-cov==6.2.1

      - name: Run tests and generate coverage report
        run: |
          pytest --cov=src --cov-report=xml  # XML report is often required by comment actions

      - name: Coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 60
          MINIMUM_ORANGE: 70

      - name: Fail if below threshold
        run: coverage report --fail-under=60
